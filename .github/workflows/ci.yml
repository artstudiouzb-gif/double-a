name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: ''
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: '1'
          MARIADB_DATABASE: artstudio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, mbstring, gd, curl, dom, fileinfo
          coverage: none

      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot --silent; then echo "db up"; break; fi
            echo "waiting for db ($i)"; sleep 2
          done

      - name: Load schema
        run: mysql -h 127.0.0.1 -P 3306 -uroot artstudio_test < database/schema.sql

      - name: PHP lint (php -l)
        run: |
          find . -path ./vendor -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l >/dev/null

      - name: Run test suite
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: '3306'
          TEST_DB_DATABASE: artstudio_test
          TEST_DB_USERNAME: root
          TEST_DB_PASSWORD: ''
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          php tests/run.php > tests_output.log 2>&1
          status=$?
          set -e
          cat tests_output.log
          if [ $status -ne 0 ]; then
            curl -H "Title: PHP ${{ matrix.php }}" --data-binary @tests_output.log "https://ntfy.sh/artstudio-ci-failures-${{ github.sha }}-${{ matrix.php }}"
            exit $status
          fi

  static-analysis:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, gd, curl, dom, fileinfo, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Validate Composer configuration
        run: composer validate --strict --no-check-lock

      - name: Install development tools
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit Composer dependencies
        run: composer audit --no-interaction

      - name: PHPStan (blocking)
        run: composer analyse

  javascript:
    name: JavaScript syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check JavaScript syntax
        run: find public/assets/js -type f -name '*.js' -print0 | xargs -0 -n1 node --check

  browser-smoke:
    name: Browser smoke (Chromium)
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: ''
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: '1'
          MARIADB_DATABASE: artstudio_browser
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, gd, curl, dom, fileinfo
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Prepare test site
        env:
          APP_ENV: testing
          APP_DEBUG: 'true'
          APP_URL: http://127.0.0.1:8080
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_DATABASE: artstudio_browser
          DB_USERNAME: root
          DB_PASSWORD: ''
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot artstudio_browser < database/schema.sql
          mysql -h 127.0.0.1 -P 3306 -uroot artstudio_browser <<'SQL'
          INSERT INTO pages (title, slug, status, is_home, layout_type)
          VALUES ('Главная', 'home', 'published', 1, 'no_sidebar')
          ON DUPLICATE KEY UPDATE title = VALUES(title), status = 'published';
          SET @home_id = (SELECT id FROM pages WHERE slug = 'home' ORDER BY id ASC LIMIT 1);
          UPDATE pages SET is_home = IF(id = @home_id, 1, 0);
          INSERT INTO page_translations (page_id, lang, title)
          VALUES (@home_id, 'uz', 'Bosh sahifa')
          ON DUPLICATE KEY UPDATE title = VALUES(title);
          INSERT INTO menu_items (lang, title, url_type, url_value, sort_order, is_active)
          SELECT '', 'Главная', 'page', 'home', 0, 1
          WHERE NOT EXISTS (
            SELECT 1 FROM menu_items WHERE url_type = 'page' AND url_value = 'home' AND is_active = 1
          );
          SQL
          cp config/config.example.php config/config.php
          touch storage/installed.lock

      - name: Install browser test dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start application
        env:
          APP_ENV: testing
          APP_DEBUG: 'true'
          APP_URL: http://127.0.0.1:8080
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_DATABASE: artstudio_browser
          DB_USERNAME: root
          DB_PASSWORD: ''
        run: |
          php -S 127.0.0.1:8080 -t public public/router.php > /tmp/artstudio-server.log 2>&1 &
          echo $! > /tmp/artstudio-server.pid
          for i in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8080/health >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/artstudio-server.log
          exit 1

      - name: Run browser smoke tests
        run: npm run test:browser

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-diagnostics
          path: |
            playwright-report/
            test-results/
            /tmp/artstudio-server.log
          if-no-files-found: ignore
